<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #183153; }
      .label { font: 600 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #183153; }
      .sub { font: 400 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4d627d; }
      .box { fill: #f5f8fc; stroke: #bfd0e2; stroke-width: 2; rx: 20; }
      .accent { fill: #edf6ff; stroke: #7cb0e0; stroke-width: 2; rx: 20; }
      .provider { fill: #eef8f4; stroke: #78b89a; stroke-width: 2; rx: 20; }
      .warn { fill: #fbf7ee; stroke: #d7b36b; stroke-width: 2; rx: 20; }
      .arrow { stroke: #5a7ea6; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .side { stroke: #9aaec6; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowheadGray); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#5a7ea6"/>
    </marker>
    <marker id="arrowheadGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#9aaec6"/>
    </marker>
  </defs>

  <text x="48" y="52" class="title">OCR 模型部署路径示意图</text>

  <rect x="70" y="110" width="250" height="100" class="box"/>
  <text x="195" y="150" text-anchor="middle" class="label">板图 OCR 任务</text>
  <text x="195" y="178" text-anchor="middle" class="sub">小位号、复杂背景、方向不统一</text>

  <rect x="70" y="276" width="250" height="116" class="box"/>
  <text x="195" y="316" text-anchor="middle" class="label">模型资源</text>
  <text x="195" y="346" text-anchor="middle" class="sub">det.onnx / rec.onnx</text>
  <text x="195" y="372" text-anchor="middle" class="sub">ppocrv5_dict.txt</text>

  <rect x="418" y="110" width="280" height="100" class="accent"/>
  <text x="558" y="150" text-anchor="middle" class="label">部署形态统一到 ONNX</text>
  <text x="558" y="178" text-anchor="middle" class="sub">为统一推理栈和 NPU 路径做准备</text>

  <rect x="418" y="276" width="280" height="116" class="accent"/>
  <text x="558" y="316" text-anchor="middle" class="label">ONNX Runtime</text>
  <text x="558" y="346" text-anchor="middle" class="sub">统一推理入口</text>
  <text x="558" y="372" text-anchor="middle" class="sub">便于接入不同 Execution Provider</text>

  <rect x="796" y="104" width="300" height="116" class="provider"/>
  <text x="946" y="144" text-anchor="middle" class="label">QNNExecutionProvider</text>
  <text x="946" y="174" text-anchor="middle" class="sub">优先走 Snapdragon 端侧 NPU 路径</text>
  <text x="946" y="200" text-anchor="middle" class="sub">保留平台能力利用空间</text>

  <rect x="796" y="292" width="300" height="100" class="warn"/>
  <text x="946" y="332" text-anchor="middle" class="label">CPUExecutionProvider</text>
  <text x="946" y="360" text-anchor="middle" class="sub">异常场景回退，保证服务可用</text>

  <rect x="418" y="484" width="280" height="126" class="box"/>
  <text x="558" y="526" text-anchor="middle" class="label">应用层调度空间</text>
  <text x="558" y="556" text-anchor="middle" class="sub">tile 切分 / 多角度旋转</text>
  <text x="558" y="582" text-anchor="middle" class="sub">候选粗筛 / BOM 匹配评分</text>

  <rect x="796" y="500" width="300" height="94" class="box"/>
      <text x="946" y="538" text-anchor="middle" class="label">输入尺寸约束</text>
      <text x="946" y="566" text-anchor="middle" class="sub">固定方形输入，反向影响上层策略</text>

  <path d="M320 160 H408" class="arrow"/>
  <path d="M320 334 C380 334, 374 208, 418 190" class="arrow"/>
  <path d="M558 210 V266" class="arrow"/>
  <path d="M698 322 C742 322, 752 204, 786 162" class="arrow"/>
  <path d="M698 342 H786" class="side"/>
  <path d="M558 392 V474" class="arrow"/>
  <path d="M796 548 H708" class="side"/>
</svg>
